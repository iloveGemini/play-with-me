<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <title>五子棋 · 内联单文件实测</title>
  <style>body{background:#f4f1ea;margin:0;padding:24px 12px;}</style>
</head>
<body>
  <!-- 模拟正则替换后的容器 -->
  <div id="gomoku-root"></div>

  <!-- 假的 TavernHelper 全局：内存版世界书 + 随机落子的 generate -->
  <script>
    (function () {
      const LS = 'gmk-bundle-books';
      const books = JSON.parse(localStorage.getItem(LS) || '{}');
      const save = () => localStorage.setItem(LS, JSON.stringify(books));

      window.getWorldbookNames = async () => Object.keys(books);
      window.createWorldbook = async (name) => { if (!books[name]) { books[name] = []; save(); } return true; };
      window.getWorldbook = async (name) => books[name] || [];
      window.updateWorldbookWith = async (name, fn) => { books[name] = fn(books[name] || []); save(); return books[name]; };
      window.createWorldbookEntries = async (name, entries) => {
        books[name] = (books[name] || []).concat(entries); save();
        return { worldbook: books[name], new_entries: entries };
      };

      // 假 AI：读存档里的棋盘，随机挑个空位落子
      window.generate = async ({ user_input, injects }) => {
        await new Promise(r => setTimeout(r, 300));
        const entry = (books['五子棋'] || []).find(e => e.name === '当前对局');
        let board = null;
        try { board = JSON.parse(entry.content).board; } catch {}
        const empty = [];
        if (board) for (let r = 0; r < board.length; r++) for (let c = 0; c < board.length; c++) if (!board[r][c]) empty.push([r, c]);
        if (!empty.length) return '无处可下。';
        const [r, c] = empty[Math.floor(Math.random() * empty.length)];
        const quips = ['就这？', '看我的。', '嘿嘿。', '接招！'];
        return `${quips[Math.floor(Math.random() * quips.length)]} <move>${r + 1},${c + 1}</move>`;
      };

      window._gmkReset = () => { localStorage.removeItem(LS); location.reload(); };
    })();
  </script>

  <!-- 打包出来的真·内联单文件 -->
  <script type="module" src="../dist/五子棋.bundle.js"></script>
</body>
</html>
